name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: zig-waf
      - uses: actions/checkout@v4
        with:
          repository: zig-utils/zig-injection
          ref: 8afd9a27a910a2688e99d78cfb717b61dea92940
          path: zig-injection
      - uses: actions/checkout@v4
        with:
          repository: zig-utils/zig-regex
          ref: 1b2293e749de60620cb6024c551fedb3d02d54c0
          path: zig-regex
      - uses: actions/checkout@v4
        with:
          repository: zig-utils/zig-tls
          ref: 0929822b781d65f91d47d2f04e15627f22a86ab7
          path: zig-tls
      - uses: actions/checkout@v4
        with:
          repository: stacksjs/stx
          ref: 38b8e9bfd8079dd3987427894b74608bf4d47876
          path: stx
      - uses: actions/checkout@v4
        with:
          repository: coreruleset/coreruleset
          ref: 55b09f5acfd16413e7b31041100711ceb7adc89c
          path: owasp-crs
      - uses: actions/checkout@v4
        with:
          repository: owasp-modsecurity/ModSecurity
          ref: 7ea9fefbe0ba409d8733b4d682c8c4c059cd028d
          path: modsecurity
      - uses: actions/checkout@v4
        with:
          repository: corazawaf/coraza
          ref: 27069d06c896be74b77b9a6c0b539a0cbfaca360
          path: coraza
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.1441+d5181a9c9
      - name: Install Pantry 0.10.47
        env:
          PANTRY_VERSION: 0.10.47
        run: curl -fsSL https://pantry.dev | bash
      - name: Install locked LMDB
        working-directory: zig-waf
        run: ~/.local/bin/pantry install openldap.org/liblmdb@0.9.35
      - name: Reject Git submodules
        working-directory: zig-waf
        run: test ! -f .gitmodules
      - name: Verify dependency lock
        working-directory: zig-waf
        run: |
          test "$(git -C ../zig-injection rev-parse HEAD)" = "$(jq -r '.repositories["zig-injection"].commit' dependencies.lock.json)"
          test "$(git -C ../zig-regex rev-parse HEAD)" = "$(jq -r '.repositories["zig-regex"].commit' dependencies.lock.json)"
          test "$(git -C ../zig-tls rev-parse HEAD)" = "$(jq -r '.repositories["zig-tls"].commit' dependencies.lock.json)"
          test "$(git -C ../stx rev-parse HEAD)" = "$(jq -r '.repositories.stx.commit' dependencies.lock.json)"
          test "$(git -C ../owasp-crs rev-parse HEAD)" = "$(jq -r '.repositories["owasp-crs"].commit' dependencies.lock.json)"
          test "$(git -C ../modsecurity rev-parse HEAD)" = "$(jq -r '.repositories.modsecurity.commit' dependencies.lock.json)"
          test "$(git -C ../coraza rev-parse HEAD)" = "$(jq -r '.repositories.coraza.commit' dependencies.lock.json)"
      - name: Format
        working-directory: zig-waf
        run: zig fmt --check build.zig src benchmarks tools
      - name: Test
        working-directory: zig-waf
        run: zig build test
      - name: Compile
        working-directory: zig-waf
        run: zig build check
      - name: CRS 4.28 parser corpus
        working-directory: zig-waf
        run: >-
          zig build test-parser-corpus
          -Dparser-corpus=../owasp-crs/crs-setup.conf.example
          -Dparser-corpus=../owasp-crs/plugins
          -Dparser-corpus=../owasp-crs/rules
          -Dparser-corpus=../modsecurity
          -Dparser-corpus=../coraza
      - name: Structural plan corpus
        working-directory: zig-waf
        run: >-
          zig build test-plan-corpus
          -Dplan-corpus=../owasp-crs/crs-setup.conf.example
          -Dplan-corpus=../owasp-crs/plugins
          -Dplan-corpus=../owasp-crs/rules
          -Dplan-corpus=../modsecurity
          -Dplan-corpus=../coraza
      - name: Stable directive inventory
        working-directory: zig-waf
        run: >-
          zig build test-directive-inventory
          -Dmodsecurity-scanner=../modsecurity/src/parser/seclang-scanner.ll
          -Dmodsecurity-parser=../modsecurity/src/parser/seclang-parser.yy
          -Dcoraza-directives=../coraza/internal/seclang/directivesmap.gen.go
      - name: Stable transformation inventory
        working-directory: zig-waf
        run: >-
          zig build test-transformation-inventory
          -Dmodsecurity-transformation-scanner=../modsecurity/src/parser/seclang-scanner.ll
          -Dmodsecurity-transformation-parser=../modsecurity/src/parser/seclang-parser.yy
          -Dcoraza-transformations=../coraza/internal/transformations/transformations.go
      - name: Stable directive corpus
        working-directory: zig-waf
        run: >-
          zig build test-directive-corpus
          -Ddirective-corpus=../owasp-crs/crs-setup.conf.example
          -Ddirective-corpus=../owasp-crs/plugins
          -Ddirective-corpus=../owasp-crs/rules
          -Ddirective-corpus=../modsecurity
          -Ddirective-corpus=../coraza
      - name: Ordered CRS directive configuration
        working-directory: zig-waf
        run: >-
          zig build test-crs-configuration
          -Dcrs-configuration=../owasp-crs/crs-setup.conf.example
          -Dcrs-configuration=../owasp-crs/rules
      - name: CRS parser benchmark
        working-directory: zig-waf
        run: >-
          zig build bench-parser -Doptimize=ReleaseFast
          -Dparser-benchmark=../owasp-crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
      - name: CRS structural plan benchmark
        working-directory: zig-waf
        run: >-
          zig build bench-plan -Doptimize=ReleaseFast
          -Dplan-benchmark=../owasp-crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
      - name: CRS directive validation benchmark
        working-directory: zig-waf
        run: >-
          zig build bench-directives -Doptimize=ReleaseFast
          -Ddirective-benchmark=../owasp-crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
      - name: Deterministic parser fuzzing
        working-directory: zig-waf
        run: zig build fuzz-parser -Dparser-fuzz-iterations=10000
      - name: Deterministic structural plan fuzzing
        working-directory: zig-waf
        run: zig build fuzz-plan -Dplan-fuzz-iterations=10000
      - name: Deterministic directive validation fuzzing
        working-directory: zig-waf
        run: zig build fuzz-directives -Ddirective-fuzz-iterations=10000
      - name: Deterministic non-disruptive action fuzzing
        working-directory: zig-waf
        run: zig build fuzz-actions -Daction-fuzz-iterations=10000
      - name: Deterministic transformation fuzzing
        working-directory: zig-waf
        run: zig build fuzz-transformations -Dtransformation-fuzz-iterations=10000
      - name: Deterministic operator fuzzing
        working-directory: zig-waf
        run: zig build fuzz-operators -Doperator-fuzz-iterations=10000
      - name: Ownership benchmark
        working-directory: zig-waf
        run: zig build bench-ownership -Doptimize=ReleaseFast
      - name: Lifecycle benchmark
        working-directory: zig-waf
        run: zig build bench-lifecycle -Doptimize=ReleaseFast
      - name: Scalar benchmark
        working-directory: zig-waf
        run: zig build bench-scalars -Doptimize=ReleaseFast
      - name: Collection benchmark
        working-directory: zig-waf
        run: zig build bench-collections -Doptimize=ReleaseFast
      - name: Persistence benchmark
        working-directory: zig-waf
        run: zig build bench-persistence -Doptimize=ReleaseFast
      - name: Non-disruptive action benchmark
        working-directory: zig-waf
        run: zig build bench-actions -Doptimize=ReleaseFast
      - name: Transformation benchmark
        working-directory: zig-waf
        run: zig build bench-transformations -Doptimize=ReleaseFast
      - name: Operator benchmark
        working-directory: zig-waf
        run: zig build bench-operators -Doptimize=ReleaseFast
      - name: Request parsing benchmark
        working-directory: zig-waf
        run: zig build bench-request -Doptimize=ReleaseFast
