SecRule ARGS|REQUEST_HEADERS "@rx attack" "id:1,tag:'group-a',msg:'hello world',deny,status:403,t:lowercase,log,auditlog"
SecRule TX "@rx score" "id:2,deny"
SecRule ARGS "@rx remove" "id:3"
SecRuleRemoveById 3
SecRuleUpdateTargetById 1 "!ARGS:secret|REQUEST_BODY"
SecRuleUpdateTargetByTag group-a "!REQUEST_HEADERS:authorization"
SecRuleUpdateTargetByMsg "hello world" FILES
SecRuleUpdateActionById 1-2 "pass,status:204,tag:'new',t:none,t:trim,nolog,noauditlog,msg:'new'"
